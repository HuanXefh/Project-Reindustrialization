info.projreind-info-map-atm001-start-copper.name = Mine [accent]malachite[] and [accent]lignite[], put them in the smelter.\nFurnaces take time to warm up, ensure that they're not short of fuel.\nWhen [accent]copper[] is produced, you have to manually take it out of the smelter.\nRemember to keep distance from a hot furnace!
info.projreind-info-map-atm001-repair.name = Use the copper you have just obtained to repair the base.\nDon't deconstruct buildings unless you're sure they are useless now.\nThis area seems free of hostile beings, relax yourself.
info.projreind-info-map-atm001-clay.name = The [blue]Survivor Drill[] is using core energy to mine [accent]clay[].\nYou will need it to build furnaces.
info.projreind-info-map-atm001-clay-brick.name = To build [blue]Bloomery[], it's a must to bake some [accent]clay bricks[] first.\nYou may need to repair the cables around here.
info.projreind-info-map-atm001-log.name = [blue]Lumberjacks[] will output [accent]logs[] as loots (dropped items).\nUse a hopper to collect them.\nLogs can be burnt for [accent]charcoal[], a better fuel.
info.projreind-info-map-atm001-cep.name = You have limited core energy!\nConsider disabling some facilities if not needed.\nFor example, that clay miner.
info.projreind-info-map-atm001-core-crafter.name = You may use [blue]Core Crafter[] to produce [accent]timber[].\n It's possible to build more efficient facilities later.
info.projreind-info-map-atm001-bloomery.name = Time to start automation.\nBuild bloomeries to smelt ores you've found.\nYou will need a lot of [accent]copper[] and [accent]lead[].
info.projreind-info-map-atm001-graphite.name = [accent]Graphite[] is required to build crucibles for alloy making.\nIt requires [red]high temperature[] though.\nYou have to utilize the [accent]anthracite[] deposit nearby.\nIt's better to build a new core here first.
info.projreind-info-map-atm001-magnetite.name = [accent]Magnetite[] is used to build [blue]Vent Generators[]\nNote that vents may differ in size!.\nYou will also need lead for it, which can be manually obtained in a [blue]Primitive Smelter[].
