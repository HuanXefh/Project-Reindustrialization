info.projreind-info-content-camp-atm001.name = Project Reindustrialization
info.projreind-info-content-camp-atm001.description = In order to explore Anthimyst, Outpost Military, Emerald Tide and Enclosure have collaboratively launched a mission called Project Reindustrialization, to build the infrastructure for future development on the planet. Outpost Military has sent several troops to land on the planet, however, only one of them has survived the landing process due to attack from mysterious planetary defense system on Anthimyst.\n\nOutpost Military has attempted to get in contact with the survivor serveral times, all of which failed, and the planet seems to be somehow alerted and turns hostile to any approaching craft. The only good news is that, the surviving core has awakened after over half a year of dormancy, and begins to follow the internal guide book...
