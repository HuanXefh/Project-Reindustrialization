info.projreind-info-dial-welcome.name = Project Reindustrialization
info.projreind-info-dial-welcome.description = [accent]Thanks for downloading this mod![]\n\nIn this mod you will see:\n    - Recipe hell.\n    - Production-based sectors.\n    - A player in despair.\n\nIf you enjoy the trip (torture), please give a star on the GitHub repo.\n\nDon't launch to numbered sectors!
info.projreind-info-dial-credits.name = Credits
info.projreind-info-dial-credits.description = Text below won't be translated.
block.projreind-eff0li-bonfire.name = Bonfire
block.projreind-eff0li-bonfire.description = The primitive light source.
dial.projreind-tip-0 = You can use a router to eliminate the tiny gaps between items, when two conveyor lines converge.
dial.projreind-tip-1 = Air units cannot fly freely in a cave, and artillery bullets will collide with wall too.
dial.projreind-tip-2 = Pouring waste water on the ground will cause increase of pollution point, at some point you will see the effect...
dial.projreind-tip-3 = In desktop, you can press a key (';' by default) to toggle all windows.
dial.projreind-tip-4 = Do not touch hot blocks.
dial.projreind-tip-5 = There's a small chance to crash the game when you click me... just kidding.
dial.projreind-tip-6 = Keep fire away from your factories, unless you wanna see a firework show.
info.projreind-info-map-atm002-copper.name = Explore around, find ores to produce [accent]copper[] and [accent]lead[].
info.projreind-info-map-atm002-bonfire.name = It's dark here, build a [blue]Bonefire[] and supply it with fuel.\nYou don't need conveyors for it, as nearby furnaces emit light once they have warmed up.
info.projreind-info-map-atm002-depth-ore.name = Some ores are hidden underground.\nUse an [blue]Alpha-Class Ore Scanner[] to reveal the ores.\nDepth ores are only mineable by some drills.
info.projreind-info-map-atm002-depth-liquid.name = Underground water can be extracted by depth pump.\nThe deposit should be scanned first.
info.projreind-info-map-atm002-timber.name = You can hardly find trees in a cave.\nUnlike charcoal, you can't produce timber without log.\nIt's also time to consider using a [blue]Sawmill[].
info.projreind-info-map-atm002-graphite.name = [accent]Graphite[] is scarce in this sector.\nUtilize the narrow tunnels as much as possible!
info.projreind-info-map-atm002-leaded-tin-bronze.name = [accent]Leaded tin bronze[] is required for advance.\nThe process is similar to what you've learned,\nbut with an extra input.
info.projreind-info-map-atm002-limestone.name = [accent]Limestone[] is crucial in steelmaking and various industries.\nIt's only available as wall deposit.
info.projreind-info-map-atm002-cast-iron.name = [accent]Cast iron[] is used in building, especially pressured equipments.\nIt's also a checkpoint before producing steel.\nFind [accent]hematite[] ore in the sector, produce [accent]pig iron[] first.
info.projreind-info-map-atm002-too-deep.name = Depth ores can be too deep to scan.\nWe're not able to mine the ore here now unless using a manual scanner.
info.projreind-info-map-atm002-steel.name = Final objective, time to produce [accent]steel[] with your bloomeries.\nThe process is similar to that of cast iron with an extra step.\nRemember the limestone you've mined.
info.projreind-info-map-atm002-fuel.name = Hope you won't forget to mine [accent]anthracite[] here.
