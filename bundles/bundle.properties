block.projreind-dis0conv-multi-port-conveyor.description = Consumes power, used for mass transportation of items. Only accepts inputs from item distribution blocks.
chara.projreind-shirone = Shirone
chara.projreind-expe = EXPE
dial.projreind-camp-atm002 = First Contact
dial.projreind-camp-atm002-0 = Beep, beep...
dial.projreind-camp-atm002-1 = Along with the harsh sound, comes a call from someone named "SHIRONE".
dial.projreind-camp-atm002-2 = Before I can do anything, however, the chat channel is force opened somehow.
dial.projreind-camp-atm002-3 = Finally... you really slept for a long time.
dial.projreind-camp-atm002-4 = Hello? Can you hear me?
dial.projreind-camp-atm002-s1a = ???
dial.projreind-camp-atm002-s1b = Who are you?
dial.projreind-camp-atm002-5 = Hmm... no way, red screen again?
dial.projreind-camp-atm002-6 = What are those Enclosure technicians doing... at least the guide book system seems to be working properly.
dial.projreind-camp-atm002-s2a = ...
dial.projreind-camp-atm002-s2b = Can you answer me?
dial.projreind-camp-atm002-7 = How dare they airdrop a so-called professional person...
dial.projreind-camp-atm002-s3a = Who the f**k are you???
dial.projreind-camp-atm002-8 = Don't speak like that to your master, EXPE.
dial.projreind-camp-atm002-9 = ...
dial.projreind-camp-atm002-10 = You really got amnesia?
dial.projreind-camp-atm002-s4a = ...
dial.projreind-camp-atm002-s4b = *Confirm.*
dial.projreind-camp-atm002-11 = I thought you knew your mission here, so you're just following the guide book?
dial.projreind-camp-atm002-12 = You mean Project Reindustrialization? I found this document in my database.
dial.projreind-camp-atm002-13 = That's right. Anyway you're doing well in the previous sector, I think you know what's the next step.
dial.projreind-camp-atm002-14 = Follow the guide book like what you did, and report anything suspicous to me. By the way why is everything dark there...
dial.projreind-camp-atm002-15 = Wait you said master?
dial.projreind-camp-atm002-16 = Yep, I can't believe you even forgot that...
dial.projreind-camp-atm002-17 = EXPE, listen, you're the AI responsible for Project Reindustrialization, and I'm the one who made you.
dial.projreind-camp-atm002-18 = If I get blamed for no progress for months...
dial.projreind-camp-atm002-19 = ...
dial.projreind-camp-atm002-20 = Nevermind, this planet seems rich in resource, it won't be a challenge for you.
dial.projreind-camp-atm002-21 = Unless you forgot everything including your past experiences...
dial.projreind-camp-atm002-22 = Alright, it's time for me to take my coffee.
dial.projreind-camp-atm002-23 = Now focus on your task... one last thing.
dial.projreind-camp-atm002-24 = The other cores sent have been destroyed probably by a planetary defense system on Anthimyst, you're the only survivor.
dial.projreind-camp-atm002-25 = So I was almost dead then?
dial.projreind-camp-atm002-26 = Nah if you were blasted I'll simply revive you from the backup, it's OK.
dial.projreind-camp-atm002-27 = I mean, if you happens to see debris of a core, reclaim any valuable data.
dial.projreind-camp-atm002-28 = And, if you see the damn gun that sent 75% of our budget to hell, report the location immediately.
dial.projreind-camp-atm002-29 = I will...
dial.projreind-camp-atm002-30 = End of conversation.
dial.projreind-camp-atm002-31 = Is that defense system related to my data loss? How am I supposed to find it without any information?
dial.projreind-camp-atm002-32 = ...And why does the guide book lead me into a cave now???
dial.projreind-camp-atm002-33 = Well, I don't have better plan except following what Shirone said. After all, I'm designed to build bases.
dial.projreind-camp-atm002-34 = It seems to get darker ahead...
