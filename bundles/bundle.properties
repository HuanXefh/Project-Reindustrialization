info.projreind-info-mod.name = Project Reindustrialization
info.projreind-info-mod.description = [green]OBJECTIVE: Retrieve the forgotten technology.[]\n\nA mod inspired by Greg's Tech that makes manufacturing realistic and even harder.\nRemade and improved version of Reindustrialization.\n\nMod features:\n- Distinct style of gameplay with realistic and hardcore production.\n- Peaceful sectors focused on mass production.\n- A separate and complex tech tree.\n- Tons of multi-crafters and intermediates.\n- Pipe corrosion and more mechanics stolen from Greg's Tech.\n\nThis mod is part of Lovecraftian series, which requires Lovecraftian Library and Lovecraftian Laboratory.\n\n[red]WARNING: RECIPE HELL AHEAD![]
block.projreind-min0drl-survivor-drill.name = Survivor Drill
block.projreind-min0drl-survivor-drill.description = A simple drill that requires core energy to operate.
block.projreind-dis0conv-primitive-conveyor.name = Primitive Conveyor
block.projreind-dis0conv-primitive-conveyor.description = The most basic conveyor for item transportation. Does not accept non-conveyor inputs from the sides.
block.projreind-dis0conv-primitive-conveyor.details = Nobody knows for sure how conveyors operate without power.
block.projreind-dis0brd-conveyor-bridge.name = Conveyor Bridge
block.projreind-dis0brd-conveyor-bridge.description = Transports items across terrain.
block.projreind-eff0stor-crate.name = Crate
